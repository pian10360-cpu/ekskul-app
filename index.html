<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekskul App</title>

<style>
body { font-family: Arial; text-align: center; background:#f5f5f5; }
.box { margin:20px; padding:20px; background:white; border-radius:10px; }
.btn { padding:10px; margin:5px; background:#4CAF50; color:white; border:none; border-radius:8px; }
input, select { padding:10px; margin:5px; width:80%; }
.hidden { display:none; }
</style>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

</head>

<body>

<!-- LOGIN -->
<div id="login" class="box">
<h2>Login</h2>

<select id="role">
  <option value="siswa">Pelajar</option>
  <option value="guru">Pengajar</option>
</select><br>

<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button class="btn" onclick="login()">Login</button>
<button class="btn" onclick="register()">Register</button>
</div>

<!-- PILIH SEKOLAH -->
<div id="sekolahBox" class="box hidden">
<h2>Pilih Sekolah</h2>
<select id="sekolah"></select><br>
<button class="btn" onclick="masukApp()">Masuk</button>
</div>

<!-- SISWA -->
<div id="siswa" class="box hidden">
<h2>Ekskul</h2>
<div id="listEkskul"></div>
</div>

<!-- GURU -->
<div id="guru" class="box hidden">
<h2>Kelola Ekskul</h2>

<input id="namaEkskul" placeholder="Nama Ekskul">
<button class="btn" onclick="tambahEkskul()">Tambah</button>

<h3>Pendaftar</h3>
<div id="listPendaftar"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
<script>

const firebaseConfig = {
  apiKey: "AIzaSyB2BXO2w1F4jE54nXMX_PioFwv4JT7GeHs",
  authDomain: "kelompok1-877c3.firebaseapp.com",
  databaseURL: "https://kelompok1-877c3-default-rtdb.firebaseio.com",
  projectId: "kelompok1-877c3",
  storageBucket: "kelompok1-877c3.firebasestorage.app",
  messagingSenderId: "110896733133",
  appId: "1:110896733133:web:d3caf8c7d2dfdab6204284",
  measurementId: "G-GCE0JKG6JD"
};



firebase.initializeApp(firebaseConfig);

// REGISTER
function register(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;
  let role = document.getElementById("role").value;

  firebase.auth().createUserWithEmailAndPassword(email, pass)
  .then(res=>{
    let uid = res.user.uid;

    firebase.database().ref("users/"+uid).set({
      email: email,
      role: role
    });

    alert("Register berhasil");
  })
  .catch(err=>alert(err.message));
}

// LOGIN
function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  firebase.auth().signInWithEmailAndPassword(email, pass)
  .then(res=>{
    let uid = res.user.uid;

    firebase.database().ref("users/"+uid).once("value")
    .then(snap=>{
      let data = snap.val();

      localStorage.setItem("uid", uid);
      localStorage.setItem("role", data.role);

      document.getElementById("login").classList.add("hidden");
      loadSekolah();
    });
  })
  .catch(err=>alert("Login gagal"));
}

// LOAD SEKOLAH
function loadSekolah(){
  document.getElementById("sekolahBox").classList.remove("hidden");

  let select = document.getElementById("sekolah");
  select.innerHTML = "";

  firebase.database().ref("ekskul").once("value")
  .then(snapshot=>{
    snapshot.forEach(child=>{
      let opt = document.createElement("option");
      opt.text = child.key;
      select.add(opt);
    });
  });
}

// MASUK APP
function masukApp(){
  let role = localStorage.getItem("role");
  let sekolah = document.getElementById("sekolah").value;

  localStorage.setItem("sekolah", sekolah);

  document.getElementById("sekolahBox").classList.add("hidden");

  if(role === "siswa"){
    tampilEkskul();
    document.getElementById("siswa").classList.remove("hidden");
  } else {
    tampilPendaftar();
    document.getElementById("guru").classList.remove("hidden");
  }
}

// TAMPIL EKSKUL
function tampilEkskul(){
  let sekolah = localStorage.getItem("sekolah");
  let list = document.getElementById("listEkskul");
  list.innerHTML = "";

  firebase.database().ref("ekskul/"+sekolah).on("value", snapshot=>{
    list.innerHTML = "";

    snapshot.forEach(child=>{
      let data = child.val();

      let btn = document.createElement("button");
      btn.innerText = data.nama;
      btn.className = "btn";
      btn.onclick = ()=> daftar(data.nama);

      list.appendChild(btn);
    });
  });
}

// DAFTAR
function daftar(ekskul){
  let uid = localStorage.getItem("uid");
  let sekolah = localStorage.getItem("sekolah");

  firebase.database().ref("pendaftaran").push({
    user: uid,
    sekolah: sekolah,
    ekskul: ekskul,
    status: "Menunggu"
  });

  alert("Berhasil daftar");
}

// TAMBAH EKSKUL
function tambahEkskul(){
  let sekolah = localStorage.getItem("sekolah");
  let nama = document.getElementById("namaEkskul").value;

  firebase.database().ref("ekskul/"+sekolah).push({
    nama: nama
  });

  alert("Ekskul ditambahkan");
}

// TAMPIL PENDAFTAR
function tampilPendaftar(){
  let sekolah = localStorage.getItem("sekolah");
  let list = document.getElementById("listPendaftar");

  firebase.database().ref("pendaftaran").on("value", snapshot=>{
    list.innerHTML = "";

    snapshot.forEach(child=>{
      let p = child.val();

      if(p.sekolah === sekolah){
        let div = document.createElement("div");
        div.innerHTML = p.user + " - " + p.ekskul + " (" + p.status + ")";

        let btn = document.createElement("button");
        btn.innerText = "Terima";
        btn.onclick = ()=>{
          firebase.database().ref("pendaftaran/"+child.key)
          .update({status:"Diterima"});
        };

        div.appendChild(btn);
        list.appendChild(div);
      }
    });
  });
}

</script>

</body>
</html>
